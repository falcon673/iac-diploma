---
- name: Створення користувача prometheus
  user:
    name: prometheus
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Створення директорій prometheus
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Перевірка чи вже встановлений prometheus
  stat:
    path: /usr/local/bin/prometheus
  register: prom_binary

- name: Завантаження prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.50.1/prometheus-2.50.1.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
  when: not prom_binary.stat.exists

- name: Розпакування prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes
  when: not prom_binary.stat.exists

- name: Копіювання бінарних файлів
  copy:
    src: "/tmp/prometheus-2.50.1.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: prometheus
    group: prometheus
    mode: "0755"
    remote_src: yes
  loop:
    - prometheus
    - promtool
  when: not prom_binary.stat.exists

- name: Розгортання конфігурації prometheus
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: restart prometheus

- name: Розгортання systemd юніту
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify:
    - reload systemd
    - restart prometheus

- name: Запуск та увімкнення prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started
    daemon_reload: yes
