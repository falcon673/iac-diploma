---
- name: Встановлення Nginx
  apt:
    name: nginx
    state: present

- name: Розгортання кастомної HTML сторінки
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  notify: reload nginx

- name: Розгортання конфігурації Nginx
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/iac
    mode: "0644"
  notify: reload nginx

- name: Активація сайту
  file:
    src: /etc/nginx/sites-available/iac
    dest: /etc/nginx/sites-enabled/iac
    state: link
  notify: reload nginx

- name: Запуск та увімкнення Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started
