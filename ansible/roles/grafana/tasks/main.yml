---
- name: Додавання GPG ключа Grafana
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Додавання репозиторію Grafana
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

- name: Встановлення Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Створення директорії datasources
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Розгортання datasource Prometheus
  template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: grafana
    mode: "0644"
  notify: restart grafana

- name: Розгортання конфігурації Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: grafana
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Запуск та увімкнення Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

- name: Завантаження дашборду Node Exporter
  get_url:
    url: "https://grafana.com/api/dashboards/1860/revisions/latest/download"
    dest: /tmp/node_exporter_dashboard.json
    mode: "0644"

- name: Очікування запуску Grafana
  wait_for:
    port: "{{ grafana_port }}"
    delay: 10
    timeout: 60

- name: Імпорт дашборду Node Exporter Full
  shell: |
    python3 -c "
    import json, urllib.request, base64
    with open('/tmp/node_exporter_dashboard.json') as f:
        dashboard = json.load(f)
    payload = json.dumps({
        'dashboard': dashboard,
        'overwrite': True,
        'folderId': 0,
        'inputs': [{'name': 'DS_PROMETHEUS', 'type': 'datasource', 'pluginId': 'prometheus', 'value': 'Prometheus'}]
    }).encode()
    req = urllib.request.Request(
        'http://localhost:{{ grafana_port }}/api/dashboards/import',
        data=payload,
        headers={'Content-Type': 'application/json', 'Authorization': 'Basic YWRtaW46YWRtaW4='}
    )
    try:
        with urllib.request.urlopen(req) as r:
            print(r.read().decode())
    except Exception as e:
        print(str(e))
    "
  ignore_errors: yes
